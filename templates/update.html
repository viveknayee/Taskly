{% extends 'base.html' %}
{% block title %} Home {% endblock title %}
{% block body %}

<div class="container my-3">
    <h2>Update Todo</h2>
    <form action="/update/{{todo.SNo}}" method="post">
        <div class="mb-3">
            <label for="title" class="form-label">Todo Title</label>
            <input type="text" class="form-control" name="title" id="title" value="{{todo.title}}" required>

        </div>
        <div class="mb-3">
            <label for="desc" class="form-label">Todo Description</label>
            <input type="text" class="form-control" value="{{todo.desc}}" name="desc" id="desc" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Priority</label>
            <select class="form-control" name="priority">
                <option value="High" {% if todo.priority=='High' %}selected{% endif %}>🔴 High</option>
                <option value="Medium" {% if todo.priority=='Medium' %}selected{% endif %}>🟡 Medium</option>
                <option value="Low" {% if todo.priority=='Low' %}selected{% endif %}>🟢 Low</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" class="form-control" name="due_date"
                value="{% if todo.due_date %}{{todo.due_date.strftime('%Y-%m-%d')}}{% endif %}">
        </div>
        <button type="submit" class="btn-main">Update Task →</button>
    </form>
</div>


<!-- Optional JavaScript -->

<!-- Option 1: Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

<!-- Option 2: Separate Popper and Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    -->


{% endblock body %}
